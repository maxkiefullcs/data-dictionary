# =============================================================================
# International Medical Software - Data Dictionary
# Production docker-compose. Database is external on internal network.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ims-data-dictionary:latest
    container_name: ims-data-dictionary

    # Restart on failure (and on daemon restart) for production reliability.
    restart: unless-stopped

    ports:
      # Host:Container - map host 3000 to container 3000.
      - "3000:3000"

    environment:
      # Database URL is provided via env file; do not hardcode credentials.
      - NODE_ENV=production
      # HOSTNAME is set in Dockerfile to 0.0.0.0 so the app listens on all interfaces.

    env_file:
      # Path relative to this file. Create .env from .env.example and set DATABASE_URL.
      - .env

    # Optional: use internal Docker network so other containers can reach this app by service name.
    networks:
      - app-net

# Internal network (no external access). DB is on organization network, not in this compose.
networks:
  app-net:
    driver: bridge
